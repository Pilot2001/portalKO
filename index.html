  color: rgba(255, 255, 255, 0.62);
}

.object-cover__facts strong {
  color: #fff;
}

.object-cover::before {
  content: "";
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 5px;
  background: linear-gradient(180deg, var(--accent), #ef6678);
}

.panel,
.metric-card,
.stat-card,
.contact-card,
.kpi-card,
.score-card,
.list-card,
.object-cover,
.hero-panel,
.login-card {
  border: 1px solid rgba(17, 17, 17, 0.06);
  box-shadow: var(--shadow);
}

.panel-soft {
  background: #faf7f4;
  border-color: rgba(17, 17, 17, 0.07);
}

.topbar > div:first-child,
.topbar__actions {
  padding: 16px 18px;
  border-radius: 24px;
  background: rgba(255, 255, 255, 0.8);
  border: 1px solid rgba(17, 17, 17, 0.06);
  box-shadow: 0 10px 24px rgba(15, 18, 24, 0.06);
}

.topbar__actions {
  justify-content: flex-end;
}

.btn {
  border-radius: 999px;
}

.btn-primary {
  background: linear-gradient(135deg, #171717, #2b2b2b);
  color: #fff;
  box-shadow: 0 14px 28px rgba(18, 18, 18, 0.18);
}

.btn-secondary {
  background: rgba(255, 255, 255, 0.92);
  border-color: rgba(17, 17, 17, 0.08);
}

.section-head {
  padding-bottom: 12px;
  border-bottom: 1px solid rgba(17, 17, 17, 0.06);
}

.metric-card,
.kpi-card,
.score-card,
.contact-card,
.list-card {
  background: linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(249, 247, 244, 0.98));
}

.nav-btn.is-active {
  background: linear-gradient(135deg, rgba(207, 32, 56, 0.18), rgba(255, 255, 255, 0.08));
  border-color: rgba(207, 32, 56, 0.35);
}

.house-chip.is-active,
.list-card.is-selected,
.btn.is-selected,
.chess-cell.is-selected {
  border-color: rgba(207, 32, 56, 0.48);
  box-shadow: 0 10px 24px rgba(207, 32, 56, 0.12);
}

.tag {
  background: rgba(17, 17, 17, 0.05);
}

.progress span {
  background: linear-gradient(90deg, var(--accent), #ef6678);
}

.score-ring {
  background:
    radial-gradient(circle closest-side, white 68%, transparent 69%),
    conic-gradient(var(--accent) calc(var(--score) * 1%), rgba(17, 17, 17, 0.08) 0);
}

.field input:focus,
.field textarea:focus,
.field select:focus {
  border-color: rgba(207, 32, 56, 0.4);
  box-shadow: 0 0 0 4px rgba(207, 32, 56, 0.08);
}

tbody tr:hover td {
  background: rgba(207, 32, 56, 0.03);
}

.auth-hero {
  background:
    radial-gradient(circle at top left, rgba(255, 255, 255, 0.06), transparent 24%),
    radial-gradient(circle at bottom right, rgba(207, 32, 56, 0.22), transparent 20%),
    linear-gradient(180deg, #111111 0%, #1a1a1a 100%);
}

.auth-note code {
  background: rgba(255, 255, 255, 0.08);
}

.filters {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 12px;
}

.filters--compact {
  grid-template-columns: repeat(2, minmax(0, 1fr));
}

.field--compact span {
  font-size: 12px;
}

.field--compact input,
.field--compact textarea,
.field--compact select {
  padding: 12px 14px;
  border-radius: 16px;
}

.ai-prompts {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 14px;
}

.ai-thread {
  display: grid;
  gap: 10px;
  max-height: 360px;
  overflow: auto;
  padding-right: 4px;
  margin-bottom: 14px;
}

.ai-bubble {
  display: grid;
  gap: 8px;
  padding: 14px 16px;
  border-radius: 18px;
  border: 1px solid rgba(17, 17, 17, 0.06);
  background: #f4f1ee;
}

.ai-bubble strong {
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--muted);
}

.ai-bubble p {
  margin: 0;
}

.ai-bubble--assistant {
  border-left: 4px solid var(--accent);
}

.ai-bubble--user {
  justify-self: end;
  max-width: 88%;
  background: #171717;
  color: #fff;
}

.ai-bubble--user strong {
  color: rgba(255, 255, 255, 0.7);
}

.completion-list {
  display: grid;
  gap: 12px;
}

.completion-row {
  display: grid;
  gap: 8px;
}

.completion-row > div:first-child {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  align-items: center;
}

.panel-nested,
.scope-hub {
  margin-top: 16px;
}

.panorama-inline {
  display: grid;
  grid-template-columns: minmax(0, 1.4fr) minmax(280px, 0.8fr);
  gap: 18px;
  align-items: stretch;
}

.panorama-inline__meta {
  display: grid;
  gap: 14px;
  padding: 20px;
  border-radius: 22px;
  background: linear-gradient(180deg, #141414, #1f1f1f);
  color: #fff;
}

.panorama-inline__meta h5 {
  margin: 0;
  font-size: 18px;
}

.panorama-inline__meta .muted {
  color: rgba(255, 255, 255, 0.72);
}

.panorama-inline__facts {
  display: grid;
  gap: 12px;
}

.panorama-inline__facts div {
  display: grid;
  gap: 4px;
  padding: 12px 14px;
  border-radius: 16px;
  background: rgba(255, 255, 255, 0.06);
  border: 1px solid rgba(255, 255, 255, 0.08);
}

.panorama-inline__facts span {
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: rgba(255, 255, 255, 0.62);
}

.panorama-inline__facts strong {
  color: #fff;
}

.premises-layout {
  align-items: start;
}

.corp-tabs {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 12px;
}

.chess-legend {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 12px;
}

.legend {
  padding: 8px 12px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 700;
}

.legend--live {
  background: rgba(13, 143, 111, 0.12);
  color: #0f6a55;
}

.legend--repair {
  background: rgba(201, 133, 0, 0.14);
  color: #8a5b00;
}

.legend--idle {
  background: rgba(17, 17, 17, 0.07);
  color: #535353;
}

.legend--unsold {
  background: rgba(207, 32, 56, 0.1);
  color: #a21428;
}

.chess-grid {
  max-height: 920px;
  overflow: auto;
  padding: 12px;
  border: 1px solid rgba(17, 17, 17, 0.08);
  border-radius: 20px;
  background: #fff;
}

.chess-row {
  display: grid;
  grid-template-columns: 60px 1fr;
  gap: 10px;
  align-items: start;
  padding: 8px 0;
  border-bottom: 1px solid rgba(17, 17, 17, 0.04);
}

.chess-row:last-child {
  border-bottom: 0;
}

.chess-floor {
  padding-top: 10px;
  font-weight: 700;
  color: var(--muted);
}

.chess-cells {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(84px, 1fr));
  gap: 8px;
}

.chess-cell {
  width: 100%;
  padding: 12px 10px;
  border-radius: 16px;
  border: 1px solid transparent;
  background: #f7f7f6;
  font-weight: 700;
  text-align: center;
  transition: 0.2s ease;
}

.chess-cell--live {
  background: rgba(13, 143, 111, 0.12);
  color: #0f6a55;
}

.chess-cell--repair {
  background: rgba(201, 133, 0, 0.14);
  color: #8a5b00;
}

.chess-cell--idle {
  background: rgba(17, 17, 17, 0.07);
  color: #4e4e4e;
}

.chess-cell--unsold {
  background: rgba(207, 32, 56, 0.12);
  color: #a21428;
}

.comment-list {
  display: grid;
  gap: 10px;
  max-height: 320px;
  overflow: auto;
}

.comment-card {
  display: grid;
  gap: 8px;
  padding: 14px 16px;
  border-radius: 18px;
  border: 1px solid rgba(17, 17, 17, 0.08);
  background: #fff;
}

.comment-card p {
  margin: 0;
}

.comment-card span {
  font-size: 12px;
  color: var(--muted);
}

.panorama-player__status {
  min-height: 620px;
  display: grid;
  place-items: center;
  text-align: center;
  color: var(--muted);
  background: linear-gradient(180deg, #f4f1ee, #ece8e4);
  padding: 24px;
}

.panorama-player--hero {
  min-height: 360px;
  border-radius: 22px;
  overflow: hidden;
  background: linear-gradient(180deg, #ece7e2, #f7f4f1);
  border: 1px solid rgba(255, 255, 255, 0.08);
}

.panorama-player--inline {
  min-height: 420px;
  border-radius: 24px;
  overflow: hidden;
  background: linear-gradient(180deg, #ece7e2, #f7f4f1);
  border: 1px solid rgba(17, 17, 17, 0.06);
}

code {
  padding: 3px 7px;
  border-radius: 8px;
  background: rgba(15, 23, 42, 0.08);
}

@media (max-width: 1240px) {
  .cards-grid {
    grid-template-columns: repeat(3, minmax(0, 1fr));
  }

  .filters {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .object-cover--with-panorama,
  .panorama-inline {
    grid-template-columns: 1fr;
  }

  .cards-grid--contacts,
  .sub-grid,
  .score-grid,
  .kpi-grid {
    grid-template-columns: 1fr;
  }
}

@media (max-width: 1040px) {
  .shell,
  .auth-page {
    grid-template-columns: 1fr;
  }

  .sidebar {
    border-right: 0;
    border-bottom: 1px solid rgba(255, 255, 255, 0.08);
  }

  .page-grid {
    grid-template-columns: 1fr;
  }

  .panel-span-12,
  .panel-span-8,
  .panel-span-7,
  .panel-span-6,
  .panel-span-5,
  .panel-span-4 {
    grid-column: span 1;
  }
}

@media (max-width: 760px) {
  .topbar,
  .main-content,
  .auth-hero,
  .auth-panel {
    padding-left: 18px;
    padding-right: 18px;
  }

  .workbook-tabs {
    margin-left: 18px;
    margin-right: 18px;
    padding: 12px;
  }

  .hero-panel,
  .object-cover,
  .topbar {
    flex-direction: column;
    align-items: stretch;
  }

  .object-cover__facts {
    grid-template-columns: 1fr;
  }

  .sidebar__logo-image {
    width: min(200px, 100%);
  }

  .cards-grid {
    grid-template-columns: 1fr;
  }

  .filters,
  .filters--compact {
    grid-template-columns: 1fr;
  }

  .form-grid {
    grid-template-columns: 1fr;
  }

  .field-span-2 {
    grid-column: span 1;
  }

  .company-stats {
    grid-template-columns: 1fr;
  }

  .map,
  .panorama-player {
    min-height: 360px;
  }

  .panorama-player__status {
    min-height: 360px;
  }

  .chess-cells {
    grid-template-columns: repeat(auto-fill, minmax(72px, 1fr));
  }

  .chess-row {
    grid-template-columns: 48px 1fr;
  }
}

/* Brand redesign override: closer to the reference look from vysota-service.ru */
:root {
  --bg: #ffffff;
  --bg-soft: #f5f7fb;
  --panel: #ffffff;
  --panel-solid: #ffffff;
  --panel-muted: #f7f9ff;
  --line: rgba(18, 25, 39, 0.1);
  --text: #151922;
  --text-strong: #0d1220;
  --muted: #6f7e96;
  --accent: #2446cf;
  --accent-2: #8c98ad;
  --success: #0d8f6f;
  --warning: #c98500;
  --shadow: 0 18px 38px rgba(27, 39, 94, 0.08);
  --radius: 28px;
}

body {
  font-family: "Segoe UI Variable Text", "Segoe UI", Tahoma, sans-serif;
  background:
    radial-gradient(circle at 100% 0, rgba(36, 70, 207, 0.07), transparent 22%),
    linear-gradient(180deg, #ffffff 0%, #fbfcff 58%, #f5f7fb 100%);
  color: var(--text);
}

body::before {
  content: "";
  position: fixed;
  inset: 0 0 auto 0;
  height: 260px;
  pointer-events: none;
  background: linear-gradient(180deg, rgba(36, 70, 207, 0.03), transparent 100%);
}

.shell-frame {
  max-width: 1360px;
  margin: 0 auto;
  padding: 0 24px 42px;
}

.shell-frame--auth {
  min-height: 100vh;
}

.shell {
  grid-template-columns: 326px minmax(0, 1fr);
  gap: 28px;
  min-height: auto;
  margin-top: 26px;
}

.main-shell {
  min-width: 0;
}

.site-header {
  padding-top: 18px;
}

.site-header__inner {
  display: flex;
  align-items: center;
  gap: 28px;
  padding: 18px 0 16px;
  border-bottom: 2px solid rgba(36, 70, 207, 0.92);
}

.site-brand {
  display: flex;
  align-items: center;
  flex: 0 0 auto;
}

.site-brand__logo {
  display: block;
  width: 165px;
  height: auto;
}

.site-menu {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 28px;
  flex-wrap: wrap;
}

.site-menu__item {
  position: relative;
  border: 0;
  background: none;
  padding: 0;
  color: #151922;
  font-size: 17px;
  font-weight: 500;
}

.site-menu__item::after {
  content: "";
  position: absolute;
  left: 0;
  right: 0;
  bottom: -18px;
  height: 2px;
  background: transparent;
  transform: scaleX(0);
  transition: 0.2s ease;
}

.site-menu__item:hover,
.site-menu__item.is-active {
  color: var(--accent);
}

.site-menu__item:hover::after,
.site-menu__item.is-active::after {
  background: var(--accent);
  transform: scaleX(1);
}

.site-header__tools {
  display: flex;
  align-items: center;
  gap: 18px;
  margin-left: auto;
}

.site-header__icon {
  width: 46px;
  height: 46px;
  display: grid;
  place-items: center;
  border-radius: 999px;
  border: 1px solid var(--line);
  background: #ffffff;
  color: var(--accent);
  font-size: 22px;
  line-height: 1;
}

.site-header__phone {
  font-size: 15px;
  font-weight: 800;
  letter-spacing: 0.02em;
  color: var(--accent);
  white-space: nowrap;
}

.sidebar {
  position: sticky;
  top: 24px;
  align-self: start;
  background: transparent;
  color: var(--text);
  border: 0;
  padding: 0;
  gap: 18px;
}

.sidebar::before {
  display: none;
}

.sidebar__brand,
.sidebar-section {
  background: #ffffff;
  border: 1px solid var(--line);
  border-radius: 28px;
  padding: 22px;
  box-shadow: var(--shadow);
}

.sidebar__brand {
  display: grid;
  gap: 14px;
  align-items: start;
}

.sidebar__title {
  font-size: 30px;
  line-height: 1;
  letter-spacing: -0.04em;
  color: var(--accent);
}

.sidebar__subtitle,
.sidebar .muted {
  color: var(--muted);
  line-height: 1.6;
}

.sidebar-section--user {
  margin-top: 0;
}

.nav-list {
  gap: 10px;
}

.nav-btn {
  justify-content: space-between;
  gap: 12px;
  padding: 14px 16px;
  border: 1px solid rgba(18, 25, 39, 0.06);
  background: linear-gradient(180deg, #ffffff, #fbfcff);
  color: var(--text);
}

.nav-btn__icon {
  width: 34px;
  height: 34px;
  background: rgba(36, 70, 207, 0.08);
  color: var(--accent);
}

.nav-btn:hover,
.house-chip:hover {
  transform: translateY(-2px);
  border-color: rgba(36, 70, 207, 0.18);
  box-shadow: 0 10px 22px rgba(36, 70, 207, 0.08);
}

.nav-btn.is-active {
  background: #f3f6ff;
  border-color: rgba(36, 70, 207, 0.22);
  color: var(--accent);
}

.house-chip {
  border: 1px solid rgba(18, 25, 39, 0.06);
  background: linear-gradient(180deg, #ffffff, #fbfcff);
  color: var(--text);
}

.house-chip.is-active,
.list-card.is-selected,
.btn.is-selected,
.chess-cell.is-selected {
  border-color: rgba(36, 70, 207, 0.26);
  background: #f3f6ff;
  box-shadow: 0 12px 24px rgba(36, 70, 207, 0.08);
}

.user-card {
  background: #f7f9ff;
  border: 1px solid rgba(36, 70, 207, 0.1);
}

.topbar {
  padding: 0;
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  align-items: end;
  gap: 18px;
  margin-bottom: 8px;
}

.topbar > div:first-child,
.topbar__actions {
  padding: 0;
  border: 0;
  background: none;
  box-shadow: none;
}

.topbar h2 {
  font-size: clamp(34px, 5vw, 58px);
  line-height: 0.96;
  letter-spacing: -0.04em;
  color: var(--accent);
  max-width: 820px;
}

.topbar .muted {
  max-width: 760px;
  line-height: 1.6;
  color: var(--muted);
}

.topbar__actions {
  justify-content: flex-end;
}

.eyebrow {
  color: var(--accent);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.2em;
}

.workbook-tabs {
  margin: 0 0 28px;
  padding: 0;
  background: none;
  border: 0;
  box-shadow: none;
  border-bottom: 1px solid rgba(18, 25, 39, 0.1);
  border-radius: 0;
  gap: 18px;
}

.workbook-tab {
  border: 0;
  background: none;
  padding: 16px 0 13px;
  border-bottom: 3px solid transparent;
  border-radius: 0;
  color: #5d6980;
  font-weight: 600;
}

.workbook-tab:hover {
  color: var(--accent);
}

.workbook-tab.is-active {
  background: none;
  color: var(--accent);
  border-color: var(--accent);
  box-shadow: none;
}

.main-content {
  padding: 0;
}

.page-grid {
  gap: 20px;
}

.panel,
.metric-card,
.stat-card,
.contact-card,
.kpi-card,
.score-card,
.list-card,
.object-cover,
.hero-panel,
.login-card {
  background: #ffffff;
  backdrop-filter: none;
  border: 1px solid var(--line);
  box-shadow: var(--shadow);
  border-radius: 30px;
}

.panel {
  padding: 24px;
}

.panel-soft {
  background: var(--panel-muted);
  border-color: rgba(36, 70, 207, 0.08);
}

.section-head {
  padding-bottom: 14px;
  margin-bottom: 18px;
  border-bottom: 1px solid rgba(18, 25, 39, 0.08);
}

.section-head h3,
.section-head h4,
.panel h4,
.panel h5 {
  color: var(--text-strong);
  letter-spacing: -0.02em;
}

.section-head span,
.metric-card__label,
.user-card__meta,
.kpi-card__meta,
.trend-values,
.auth-note {
  color: var(--muted);
}

.hero-panel {
  grid-column: span 12;
  display: grid;
  grid-template-columns: minmax(0, 0.95fr) minmax(320px, 0.85fr);
  align-items: start;
  gap: 28px;
  padding: 42px 44px;
  overflow: hidden;
  color: var(--text);
  background: #ffffff;
  position: relative;
}

.hero-panel::after {
  content: "";
  position: absolute;
  left: 44px;
  bottom: 40px;
  width: 180px;
  height: 2px;
  background: rgba(36, 70, 207, 0.25);
}

.hero-panel h1,
.auth-hero h1 {
  font-size: clamp(60px, 8vw, 92px);
  line-height: 0.9;
  text-transform: uppercase;
  letter-spacing: -0.06em;
  color: var(--accent);
  max-width: 560px;
}

.hero-panel__copy,
.auth-hero__copy {
  display: grid;
  gap: 22px;
  min-width: 0;
  align-content: start;
}

.hero-panel__mission {
  margin: 0;
  max-width: 560px;
  font-family: "Bahnschrift", "Segoe UI Variable Display", "Segoe UI", sans-serif;
  font-size: clamp(24px, 3vw, 44px);
  line-height: 1.08;
  letter-spacing: -0.03em;
  text-transform: uppercase;
  color: #111622;
}

.hero-panel__visual {
  display: grid;
  gap: 20px;
  justify-items: end;
  align-content: start;
}

.hero-panel__awards {
  width: min(420px, 100%);
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 12px;
}

.hero-award {
  padding: 18px 18px 16px;
  border-radius: 22px;
  background: linear-gradient(180deg, #2446cf, #2b52e8);
  color: #ffffff;
  min-height: 112px;
  display: grid;
  gap: 8px;
  align-content: space-between;
  box-shadow: 0 18px 30px rgba(36, 70, 207, 0.18);
}

.hero-award strong {
  font-size: 30px;
  line-height: 1;
}

.hero-award span {
  font-size: 13px;
  line-height: 1.4;
  color: rgba(255, 255, 255, 0.82);
}

.hero-panel__linkrow {
  display: flex;
  align-items: center;
  gap: 18px;
  flex-wrap: wrap;
}

.hero-link {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  border: 0;
  background: none;
  padding: 0;

.brand-ornament {
  display: grid;
  grid-template-columns: repeat(6, 56px);
  grid-auto-rows: 56px;
  gap: 0;
  width: max-content;
}

.brand-ornament__cell {
  position: relative;
  width: 56px;
  height: 56px;
}

.brand-ornament__cell::before {
  content: "";
  position: absolute;
  inset: 0;
  background: #c5cfdd;
}

.brand-ornament__cell.tone-1::before {
  background: #cbd3df;
}

.brand-ornament__cell.tone-2::before {
  background: #a9b4c6;
}

.brand-ornament__cell.tone-3::before {
  background: #8f9bb1;
}

.brand-ornament__cell.tone-4::before {
  background: #525b67;
}

.brand-ornament__cell.is-empty::before {
  display: none;
}

.brand-ornament__cell.is-full::before {
  border-radius: 999px;
}

.brand-ornament__cell.is-half-top::before {
  border-radius: 999px 999px 0 0;
}

.brand-ornament__cell.is-half-bottom::before {
  border-radius: 0 0 999px 999px;
}

.brand-ornament__cell.is-half-left::before {
  border-radius: 999px 0 0 999px;
}

.brand-ornament__cell.is-half-right::before {
  border-radius: 0 999px 999px 0;
}

.brand-ornament__cell.is-quarter-tl::before {
  border-radius: 999px 0 0 0;
}

.brand-ornament__cell.is-quarter-tr::before {
  border-radius: 0 999px 0 0;
}

.brand-ornament__cell.is-quarter-bl::before {
  border-radius: 0 0 0 999px;
}

.brand-ornament__cell.is-quarter-br::before {
  border-radius: 0 0 999px 0;
}

.brand-ornament--auth {
  transform: translate(18px, -8px);
}

.brand-ornament--hero {
  transform: translate(0, -8px);
}

.auth-page {

.stat-card {

.auth-panel {

.btn-primary {

code {

}

.metric-card,
.kpi-card,
.score-card,
.contact-card,
.list-card,
.comment-card,
.panel,
.hero-panel,
.object-cover {
  border-radius: 32px;
}

.hero-panel,
.object-cover {
  padding: 40px 42px;
}

.hero-panel {
  grid-template-columns: minmax(0, 0.88fr) minmax(520px, 1.12fr);
  gap: 28px;
}

.hero-panel--with-panorama {
  grid-template-columns: minmax(0, 0.86fr) minmax(620px, 1.14fr);
}

.hero-panel h1,
.auth-hero h1 {
  max-width: 520px;
  font-size: clamp(56px, 6.6vw, 94px);
}

.hero-panel__mission {
  max-width: 680px;
}

.object-cover__media,
.object-cover__media--dashboard,
.panorama-player--hero {
  min-height: 420px;
}

.object-cover__facts {
  grid-template-columns: repeat(4, minmax(0, 1fr));
}

.hero-panel__awards {
  grid-template-columns: repeat(4, minmax(96px, 1fr));
}

@media (max-width: 1440px) {
  .cards-grid {
    grid-template-columns: repeat(3, minmax(0, 1fr));
  }
}

@media (max-width: 1240px) {
  .shell {
    grid-template-columns: 1fr;
  }

  .sidebar {
    position: static;
  }

  .topbar {
    grid-template-columns: 1fr;
  }

  .hero-panel,
  .hero-panel--with-panorama {
    grid-template-columns: 1fr;
  }

  .cards-grid {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .object-cover__facts {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }
}

@media (max-width: 760px) {
  .shell-frame {
    padding: 0 14px 28px;
  }

  .site-header__inner {
    grid-template-columns: 1fr;
    align-items: start;
    gap: 14px;
  }

  .site-brand {
    min-width: 0;
  }

  .site-brand__logo {
    height: 48px;
  }

  .site-header__tools {
    width: 100%;
    justify-content: space-between;
  }

  .topbar {
    padding: 18px;
  }

  .hero-panel,
  .object-cover {
    padding: 26px 22px;
  }

  .cards-grid,
  .object-cover__facts {
    grid-template-columns: 1fr;
  }

  .object-cover__media,
  .object-cover__media--dashboard,
  .panorama-player--hero {
    min-height: 300px;
  }
}

  </style>

  <script>
(function () {
  const STORAGE_KEY = "vs-house-portal-prototype-v4";
  const DEFAULT_UI = {
    activeView: "card",
    cardSection: "overview",
    selectedHouseId: "metropolia-11",
    selectedPremiseId: null,
    selectedCorpId: null,
    searchQuery: "",
    premiseFilter: "all",
    serviceMode: "residential",
    serviceQuery: "",
    documentQuery: "",
    session: null,
    aiMessages: []
  };

  let state = loadState();
  let mapInstance = null;
  let panoramaPlayer = null;
  let inlinePanoramaPlayer = null;

  document.addEventListener("click", handleClick);
  document.addEventListener("submit", handleSubmit);
  document.addEventListener("input", handleInput);
  document.addEventListener("change", handleChange);

  render();

  function loadState() {
    const seed = deepClone(window.PROTOTYPE_SEED);
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) {
        return { data: seed, ui: withUiDefaults({}) };
      }

      const saved = JSON.parse(raw);
      return {
        data: saved.data && saved.data.version === seed.version ? saved.data : seed,
        ui: withUiDefaults(saved.ui || {})
      };
    } catch (error) {
      return { data: seed, ui: withUiDefaults({}) };
    }
  }

  function withUiDefaults(ui) {
    const next = { ...DEFAULT_UI, ...(ui || {}) };
    if (!Array.isArray(next.aiMessages) || !next.aiMessages.length) {
      next.aiMessages = getDefaultAiMessages();
    }
    return next;
  }

  function saveState() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  function deepClone(value) {
    return JSON.parse(JSON.stringify(value));
  }

  function getCurrentUser() {
    return state.ui.session;
  }

  function getSelectedHouse() {
    return (
      state.data.houses.find((house) => house.id === state.ui.selectedHouseId) ||
      state.data.houses[0]
    );
  }

  function getSelectedPremise(house) {
    const currentHouse = house || getSelectedHouse();
    if (!currentHouse) {
      return null;
    }
    return (
      currentHouse.premises.find((item) => item.id === state.ui.selectedPremiseId) ||
      currentHouse.premises[0] ||
      null
    );
  }

  function canEdit() {
    const user = getCurrentUser();
    return user && user.role === "admin";
  }

  function setSelectedHouse(houseId, view) {
    const house = state.data.houses.find((item) => item.id === houseId) || state.data.houses[0];
    if (!house) {
      return;
    }
    state.ui.selectedHouseId = house.id;
    state.ui.selectedPremiseId = house.premises[0] ? house.premises[0].id : null;
    state.ui.selectedCorpId = house.chessboard && house.chessboard.corps[0] ? house.chessboard.corps[0].id : null;
    state.ui.cardSection = "overview";
    if (view) {
      state.ui.activeView = view;
    }
  }

  function resetDemo() {
    const session = getCurrentUser();
    state = {
      data: deepClone(window.PROTOTYPE_SEED),
      ui: withUiDefaults({
        session,
        selectedHouseId: "metropolia-11"
      })
    };
    setSelectedHouse(state.ui.selectedHouseId, state.ui.activeView);
    saveState();
    closePanorama();
    render();
    toast("Демо-данные восстановлены.");
  }

  function handleClick(event) {
    const actionEl = event.target.closest("[data-action]");
    if (!actionEl) {
      return;
    }

    const action = actionEl.dataset.action;

    if (action === "switch-view") {
      state.ui.activeView = actionEl.dataset.view;
      if (state.ui.activeView === "card" && !state.ui.cardSection) {
        state.ui.cardSection = "overview";
      }
      saveState();
      render();
      return;
    }

    if (action === "switch-card-section") {
      state.ui.activeView = "card";
      state.ui.cardSection = actionEl.dataset.section || "overview";
      saveState();
      render();
      return;
    }

    if (action === "select-house") {
      setSelectedHouse(actionEl.dataset.houseId, actionEl.dataset.view || "card");
      if (actionEl.dataset.section) {
        state.ui.cardSection = actionEl.dataset.section;
      }
      saveState();
      render();
      return;
    }

    if (action === "select-premise") {
      state.ui.selectedPremiseId = actionEl.dataset.id;
      saveState();
      render();
      return;
    }

    if (action === "select-corp") {
      state.ui.selectedCorpId = actionEl.dataset.id;
      saveState();
      render();
      return;
    }

    if (action === "set-service-mode") {
      state.ui.serviceMode = actionEl.dataset.mode || "residential";
      saveState();
      render();
      return;
    }

    if (action === "apply-chat-prompt") {
      const prompt = actionEl.dataset.prompt || actionEl.textContent || "";
      runAssistant(prompt.trim());
      return;
    }

    if (action === "export-json") {
      exportState();
      return;
    }

    if (action === "trigger-import") {
      const input = document.getElementById("json-import");
      if (input) {
        input.value = "";
        input.click();
      }
      return;
    }

    if (action === "print") {
      printHouseCard(getSelectedHouse());
      return;
    }

    if (action === "logout") {
      state.ui.session = null;
      state.ui.activeView = "card";
      saveState();
      destroyMap();
      closePanorama();
      render();
      return;
    }

    if (action === "open-panorama") {
      openPanorama();
      return;
    }

    if (action === "close-panorama") {
      closePanorama();
      return;
    }

    if (action === "reset-demo") {
      resetDemo();
      return;
    }

    if (action === "delete-premise" && canEdit()) {
      const house = getSelectedHouse();
      house.premises = house.premises.filter((item) => item.id !== actionEl.dataset.id);
      state.ui.selectedPremiseId = house.premises[0] ? house.premises[0].id : null;
      saveState();
      render();
      toast("Помещение удалено.");
      return;
    }

    if (action === "delete-tariff" && canEdit()) {
      const house = getSelectedHouse();
      house.tariffHistory = house.tariffHistory.filter((item, index) => String(index) !== actionEl.dataset.index);
      saveState();
      render();
      toast("Период тарифа удален.");
      return;
    }

    if (action === "delete-partner" && canEdit()) {
      state.data.partners = state.data.partners.filter((item) => item.id !== actionEl.dataset.id);
      saveState();
      render();
      toast("Партнер удален.");
      return;
    }
  }

  function handleInput(event) {
    const target = event.target;
    const key = target.dataset.uiInput;
    if (!key) {
      return;
    }
    const snapshot = {
      key,
      selectionStart: typeof target.selectionStart === "number" ? target.selectionStart : null,
      selectionEnd: typeof target.selectionEnd === "number" ? target.selectionEnd : null
    };
    state.ui[key] = target.value;
    saveState();
    render();
    restoreUiInput(snapshot);
  }

  function handleChange(event) {
    const target = event.target;
    if (target.id === "json-import" && target.files && target.files[0]) {
      importState(target.files[0]);
    }
  }

  function handleSubmit(event) {
    const form = event.target;
    const formData = new FormData(form);

    if (form.matches("[data-form='login']")) {
      event.preventDefault();
      const login = String(formData.get("login") || "").trim();
      const password = String(formData.get("password") || "").trim();
      const user = state.data.users.find((item) => item.login === login && item.password === password);

      if (!user) {
        toast("Неверный логин или пароль.");
        return;
      }

      state.ui.session = { login: user.login, role: user.role, name: user.name };
      state.ui.activeView = "card";
      state.ui.aiMessages = getDefaultAiMessages();
      setSelectedHouse(state.ui.selectedHouseId, "card");
      saveState();
      render();
      toast(`Вход выполнен: ${user.name}`);
      return;
    }

    if (form.matches("[data-form='chat']")) {
      event.preventDefault();
      const message = String(formData.get("message") || "").trim();
      if (message) {
        runAssistant(message);
        form.reset();
      }
      return;
    }

    if (form.matches("[data-form='comment']")) {
      event.preventDefault();
      const house = getSelectedHouse();
      const text = String(formData.get("text") || "").trim();
      if (!text) {
        return;
      }
      house.comments.unshift(
        comment(
          `comment-${Date.now()}`,
          String(formData.get("scopeType") || "house"),
          String(formData.get("scopeId") || house.id),
          getCurrentUser().name,
          getCurrentUser().role,
          text,
          new Date().toLocaleString("ru-RU")
        )
      );
      saveState();
      render();
      toast("Комментарий добавлен.");
      return;
    }

    if (form.matches("[data-form='attachment']")) {
      event.preventDefault();
      const house = getSelectedHouse();
      const file = form.querySelector("input[name='file']") && form.querySelector("input[name='file']").files[0];
      const manualName = valueOr(formData.get("manualName"), "Файл без названия");
      const note = valueOr(formData.get("note"), "Описание не заполнено");
      house.attachments.unshift(
        attachment(
          `attachment-${Date.now()}`,
          String(formData.get("scopeType") || "house"),
          String(formData.get("scopeId") || house.id),
          file ? file.name : manualName,
          note,
          valueOr(formData.get("content"), "Для демо добавлен файл без извлеченного текста.")
        )
      );
      saveState();
      render();
      toast("Файл добавлен в карточку.");
      return;
    }

    if (!canEdit()) {
      return;
    }

    if (form.matches("[data-form='house']")) {
      event.preventDefault();
      const mode = formData.get("mode");
      const coords = parseCoords(formData.get("coords"));
      const zone = parsePolygon(formData.get("serviceZone"));

      if (mode === "create") {
        const id = slugify(formData.get("name")) || `house-${Date.now()}`;
        const newHouse = createEmptyHouse(id, formData, coords, zone);
        state.data.houses.unshift(newHouse);
        setSelectedHouse(id, "card");
        saveState();
        render();
        toast("Новый объект добавлен.");
        return;
      }

      const house = getSelectedHouse();
      house.name = valueOr(formData.get("name"), house.name);
      house.subtitle = valueOr(formData.get("subtitle"), house.subtitle);
      house.shortName = valueOr(formData.get("shortName"), house.shortName);
      house.address = valueOr(formData.get("address"), house.address);
      house.district = valueOr(formData.get("district"), house.district);
      house.status = valueOr(formData.get("status"), house.status);
      house.className = valueOr(formData.get("className"), house.className);
      house.launchDate = valueOr(formData.get("launchDate"), house.launchDate);
      house.managementSince = valueOr(formData.get("managementSince"), house.managementSince);
      house.coordinates = coords || house.coordinates;
      house.serviceZone = zone.length ? zone : house.serviceZone;
      house.summary.buildings = Number(formData.get("buildings") || house.summary.buildings || 0);
      house.summary.apartments = Number(formData.get("apartments") || house.summary.apartments || 0);
      house.summary.premises = Number(formData.get("premisesCount") || house.summary.premises || 0);
      house.summary.totalArea = valueOr(formData.get("totalArea"), house.summary.totalArea);
      house.summary.tariffArea = valueOr(formData.get("tariffArea"), house.summary.tariffArea);
      house.summary.parkingPlaces = Number(formData.get("parkingPlaces") || house.summary.parkingPlaces || 0);
      house.summary.specialAccount = valueOr(formData.get("specialAccount"), house.summary.specialAccount);
      saveState();
      render();
      toast("Карточка объекта обновлена.");
      return;
    }

    if (form.matches("[data-form='premise']")) {
      event.preventDefault();
      const house = getSelectedHouse();
      const premise = {
        id: `pm-${Date.now()}`,
        type: valueOr(formData.get("type"), "Помещение"),
        category: "custom",
        code: valueOr(formData.get("code"), "Без кода"),
        area: valueOr(formData.get("area"), "0 м2"),
        owner: valueOr(formData.get("owner"), "Не указан"),
        status: valueOr(formData.get("status"), "Черновик"),
        completion: 58,
        services: [],
        description: "Добавлено через админ-раздел."
      };
      house.premises.unshift(premise);
      state.ui.selectedPremiseId = premise.id;
      saveState();
      render();
      toast("Помещение добавлено.");
      return;
    }

    if (form.matches("[data-form='tariff']")) {
      event.preventDefault();
      const house = getSelectedHouse();
      house.tariffHistory.unshift({
        period: valueOr(formData.get("period"), "Новый период"),
        basis: valueOr(formData.get("basis"), "Основание не указано"),
        rows: [
          {
            roomType: valueOr(formData.get("roomType"), "Квартиры"),
            sir: valueOr(formData.get("sir"), "0"),
            security: valueOr(formData.get("security"), "0"),
            concierge: valueOr(formData.get("concierge"), "-"),
            extra: valueOr(formData.get("extra"), "-")
          }
        ]
      });
      saveState();
      render();
      toast("Период тарифа добавлен.");
      return;
    }

    if (form.matches("[data-form='partner']")) {
      event.preventDefault();
      state.data.partners.unshift({
        id: `partner-${Date.now()}`,
        serviceType: valueOr(formData.get("service"), "Новая услуга"),
        brand: valueOr(formData.get("brand"), "Новый партнер"),
        legal: valueOr(formData.get("legal"), "Юр. лицо"),
        subject: valueOr(formData.get("objects"), "Все объекты"),
        contacts: valueOr(formData.get("contacts"), "Не заполнено")
      });
      saveState();
      render();
      toast("Партнер добавлен.");
    }
  }

  function render() {
    const app = document.getElementById("app");
    if (!getCurrentUser()) {
      destroyMap();
      destroyInlinePanorama();
      closePanorama();
      app.innerHTML = renderAuth();
      return;
    }

    ensureSelection();
    const house = getSelectedHouse();
    app.innerHTML = `
      <div class="shell-frame">
        ${renderSiteHeader()}
        <div class="shell">
          ${renderSidebar(house)}
          <div class="main-shell">
            ${renderTopbar(house)}
            ${renderWorkbookTabs()}
            <main class="main-content">
              ${renderView(house)}
            </main>
          </div>
        </div>
      </div>
      ${renderPanoramaModal()}
      <input id="json-import" type="file" accept="application/json" hidden>
    `;

    if (state.ui.activeView === "map") {
      initMap();
    } else {
      destroyMap();
    }

    if (state.ui.activeView === "dashboard" || (state.ui.activeView === "card" && state.ui.cardSection === "overview")) {
      initInlinePanorama(house);
    } else {
      destroyInlinePanorama();
    }
  }

  function renderSiteHeader() {
    const company = state.data.company;
    const activeView = state.ui.activeView;
    return `
      <header class="site-header">
        <div class="site-header__inner">
          <a class="site-brand" href="${escapeAttr(company.website)}" target="_blank" rel="noreferrer">
            <img class="site-brand__logo" src="${escapeAttr(company.logoUrl)}" alt="${escapeAttr(company.name)}">

          <nav class="site-menu" aria-label="Основная навигация">

              <tbody>
                ${state.data.partners

  function renderCommercialBlock(data) {
    const progress = data.plan ? Math.round((data.fact / data.plan) * 100) : 0;
    return `
      <div class="commercial-card">
        <div class="commercial-card__top">
          <div>
            <div class="metric-card__label">План</div>
            <div class="metric-card__value">${formatMoney(data.plan)}</div>
          </div>
          <div>
            <div class="metric-card__label">Факт</div>
            <div class="metric-card__value">${formatMoney(data.fact)}</div>
          </div>
        </div>
        <div class="progress"><span style="width:${Math.max(6, progress)}%"></span></div>
        <div class="commercial-bars">
          <div><span>Внутренние</span><strong>${formatMoney(data.internal)}</strong></div>
          <div><span>Внешние</span><strong>${formatMoney(data.external)}</strong></div>
        </div>
      </div>
    `;
  }

  function renderPairGrid(pairs) {
    return `
      <div class="pair-grid">
        ${pairs
          .map(
            ([label, value]) => `
              <div class="pair-row">
                <span>${escapeHtml(label)}</span>
                <strong>${escapeHtml(String(value))}</strong>
              </div>
            `
          )
          .join("")}
      </div>
    `;
  }

  function renderPeopleTable(title, rows, keys) {
    return `
      <div class="panel panel-soft">
        <h4>${escapeHtml(title)}</h4>
        ${renderTable(
          keys.map(humanizeKey),
          rows.map((row) => keys.map((key) => row[key] || "-"))
        )}
      </div>
    `;
  }

  function renderTable(headers, rows, allowHtmlLastColumn) {
    return `
      <div class="mini-table">
        <table>
          <thead>
            <tr>${headers.map((header) => `<th>${escapeHtml(header)}</th>`).join("")}</tr>
          </thead>
          <tbody>
            ${
              rows.length
                ? rows
                    .map(
                      (row) => `
                        <tr>
                          ${row
                            .map((cell, index) => {
                              if (allowHtmlLastColumn && index === row.length - 1) {
                                return `<td>${cell}</td>`;
                              }
                              return `<td>${escapeHtml(String(cell ?? "-"))}</td>`;
                            })
                            .join("")}
                        </tr>
                      `
                    )
                    .join("")
                : `<tr><td colspan="${headers.length}" class="empty-cell">Нет данных</td></tr>`
            }
          </tbody>
        </table>
      </div>
    `;
  }

  function ensureSelection() {
    const house = getSelectedHouse();
    if (!house) {
      return;
    }
    if ((!state.ui.selectedPremiseId || !house.premises.some((item) => item.id === state.ui.selectedPremiseId)) && house.premises[0]) {
      state.ui.selectedPremiseId = house.premises[0].id;
    }
    if (
      (!state.ui.selectedCorpId || !house.chessboard || !house.chessboard.corps.some((item) => item.id === state.ui.selectedCorpId)) &&
      house.chessboard &&
      house.chessboard.corps[0]
    ) {
      state.ui.selectedCorpId = house.chessboard.corps[0].id;
    }
  }

  function restoreUiInput(snapshot) {
    if (!snapshot || !snapshot.key) {
      return;
    }
    const input = document.querySelector(`[data-ui-input="${snapshot.key}"]`);
    if (!input) {
      return;
    }
    input.focus({ preventScroll: true });
    if (
      typeof input.setSelectionRange === "function" &&
      typeof snapshot.selectionStart === "number" &&
      typeof snapshot.selectionEnd === "number"
    ) {
      input.setSelectionRange(snapshot.selectionStart, snapshot.selectionEnd);
    }
  }

  function getDefaultAiMessages() {
    return [
      {
        role: "assistant",
        text: "Я могу найти сведения по объекту, помещениям, услугам и прикрепленным документам, а также собрать краткий отчет по выбранному дому."
      }
    ];
  }

  function getSectionCompletion(house, sectionId) {
    if (sectionId === "overview") return Math.min(100, Math.round((house.mainInfo.length / 14) * 100));
    if (sectionId === "staff") return Math.min(100, Math.round(((house.personnel.objectTeam.length + house.personnel.cleaning.length + house.personnel.security.length + house.personnel.concierge.length) / 18) * 100));
    if (sectionId === "tariffs") return Math.min(100, 55 + house.tariffHistory.length * 10);
    if (sectionId === "contracts") return Math.min(100, 40 + house.contracts.length * 8);
    if (sectionId === "oss") return Math.min(100, 35 + house.oss.length * 20);
    if (sectionId === "metrics") return Math.min(100, 45 + house.metrics.cards.length * 10);
    if (sectionId === "audit") return Math.min(100, 45 + house.audit.sections.length * 10);
    if (sectionId === "technical") return Math.min(100, 40 + (house.technical.passport.length + house.technical.commonInfo.length) * 4);
    if (sectionId === "premises") return Math.min(100, 55 + Math.round(Math.min(house.premises.length, 1200) / 25));
    if (sectionId === "documents") return Math.min(100, 30 + (house.attachments.length + house.comments.length) * 5);
    return 0;
  }

  function getHouseCompletion(house) {
    const sections = ["overview", "staff", "tariffs", "contracts", "oss", "metrics", "audit", "technical", "premises", "documents"];
    const total = sections.reduce((sum, sectionId) => sum + getSectionCompletion(house, sectionId), 0);
    return Math.round(total / sections.length);
  }

  function buildHouseHaystack(house) {
    return [
      house.name,
      house.shortName,
      house.address,
      house.status,
      house.className,
      ...(house.mainInfo || []).flat(),
      ...(house.tariffHistory || []).flatMap((item) => [item.period, item.basis, ...(item.rows || []).flatMap((row) => Object.values(row))]),
      ...(house.contracts || []).flatMap((item) => [item.group, item.name]),
      ...(house.oss || []).flatMap((item) => [item.period, item.form, item.dates, item.quorum, ...(item.approved || []), ...(item.rejected || [])]),
      ...(house.premises || []).flatMap((item) => [item.code, item.type, item.owner, item.status, item.description, ...(item.services || [])]),
      ...(house.attachments || []).map((item) => `${item.name} ${item.description} ${item.content}`),
      ...(house.comments || []).map((item) => item.text)
    ]
      .join(" ")
      .toLowerCase();
  }

  function getFilteredHouses() {
    const query = String(state.ui.searchQuery || "").trim().toLowerCase();
    const serviceQuery = String(state.ui.serviceQuery || "").trim().toLowerCase();
    if (!query) {
      if (!serviceQuery) {
        return state.data.houses;
      }
      return state.data.houses.filter((house) =>
        house.premises.some((premise) => `${(premise.services || []).join(" ")} ${premise.description || ""}`.toLowerCase().includes(serviceQuery))
      );
    }
    return state.data.houses.filter((house) => {
      if (buildHouseHaystack(house).includes(query)) {
        if (!serviceQuery) {
          return true;
        }
        return house.premises.some((premise) => `${(premise.services || []).join(" ")} ${premise.description || ""}`.toLowerCase().includes(serviceQuery));
      }
      const premiseMatch = house.premises.some((premise) =>
        `${premise.code} ${premise.type} ${premise.owner} ${premise.status} ${(premise.services || []).join(" ")}`.toLowerCase().includes(query)
      );
      if (!premiseMatch) {
        return false;
      }
      if (!serviceQuery) {
        return true;
      }
      return house.premises.some((premise) => `${(premise.services || []).join(" ")} ${premise.description || ""}`.toLowerCase().includes(serviceQuery));
    });
  }

  function getFilteredPremises(house) {
    const query = String(state.ui.searchQuery || "").trim().toLowerCase();
    const serviceQuery = String(state.ui.serviceQuery || "").trim().toLowerCase();
    const filter = state.ui.premiseFilter || "all";
    return house.premises.filter((premise) => {
      const queryPass =
        !query ||
        `${premise.code} ${premise.type} ${premise.owner} ${premise.status} ${premise.description || ""} ${(premise.services || []).join(" ")}`.toLowerCase().includes(query);
      const servicePass = !serviceQuery || `${(premise.services || []).join(" ")} ${premise.description || ""}`.toLowerCase().includes(serviceQuery);
      const filterPass = filter === "all" || premise.category === filter || premise.type.toLowerCase().includes(filter);
      return queryPass && filterPass && servicePass;
    });
  }

  function getActiveCorp(house) {
    if (!house.chessboard || !house.chessboard.corps.length) {
      return null;
    }
    return house.chessboard.corps.find((corp) => corp.id === state.ui.selectedCorpId) || house.chessboard.corps[0];
  }

  function getScopeAttachments(house, scopeType, scopeId) {
    return (house.attachments || []).filter((item) => item.scopeType === scopeType && item.scopeId === scopeId);
  }

  function getScopeComments(house, scopeType, scopeId) {
    return (house.comments || []).filter((item) => item.scopeType === scopeType && item.scopeId === scopeId);
  }

  function getSearchResults(house) {
    const query = String(state.ui.searchQuery || "").trim().toLowerCase();
    if (!query) {
      return {
        premises: getFilteredPremises(house).slice(0, 8),
        attachments: house.attachments.slice(0, 6),
        services: getServiceCatalog(state.ui.serviceMode, state.ui.serviceQuery).slice(0, 6)
      };
    }

    const premises = getFilteredPremises(house).slice(0, 8);
    const attachments = house.attachments.filter((item) => `${item.name} ${item.description} ${item.content}`.toLowerCase().includes(query)).slice(0, 6);
    const services = getServiceCatalog("all", query).slice(0, 8);
    return { premises, attachments, services };
  }

  function runAssistant(message) {
    if (!String(message || "").trim()) {
      toast("Введите запрос для AI-помощника.");
      return;
    }
    const house = getSelectedHouse();
    state.ui.aiMessages.push({ role: "user", text: message });
    state.ui.aiMessages.push({ role: "assistant", text: answerAssistant(message, house) });
    state.ui.aiMessages = state.ui.aiMessages.slice(-12);
    saveState();
    render();
  }

  function answerAssistant(message, house) {
    const query = String(message || "").trim().toLowerCase();
    const results = getSearchResults(house);

    if (/отчет|свод|summary|кратк/i.test(query)) {
      return [
        `Отчет по объекту ${house.shortName || house.name}:`,
        `Заполненность карточки: ${getHouseCompletion(house)}%.`,
        `Основные показатели: ${house.summary.totalArea}, ${house.summary.apartments} квартир, ${house.summary.parkingPlaces} машино-мест.`,
        `Текущий статус: ${house.status}. Последнее обновление: ${house.lastUpdated || "не указано"}.`,
        `Зоны внимания: ${getSectionCompletion(house, "technical") < 80 ? "техописание" : "техописание без критичных пробелов"}, ${getSectionCompletion(house, "documents") < 80 ? "документы и обсуждения" : "документы заполнены достаточно"}.`
      ].join("\n");
    }

    const premiseMatch = house.premises.find((item) => query.includes(String(item.code).toLowerCase()));
    if (premiseMatch) {
      const files = getScopeAttachments(house, "premise", premiseMatch.id);
      const notes = getScopeComments(house, "premise", premiseMatch.id);
      return [
        `Найдено помещение ${premiseMatch.code}: ${premiseMatch.type}, ${premiseMatch.area}, статус ${premiseMatch.status}.`,
        `Собственник: ${premiseMatch.owner}. Заполненность: ${premiseMatch.completion || 0}%.`,
        `Услуги: ${(premiseMatch.services || []).join(", ") || "не указаны"}.`,
        `Файлы: ${files.length ? files.map((item) => item.name).join(", ") : "нет файлов"}.`,
        `Комментарии: ${notes.length ? notes[0].text : "нет комментариев"}.`
      ].join("\n");
    }

    if (/тариф|услуг|прейск|код/i.test(query)) {
      const services = getServiceCatalog("all", query).slice(0, 5);
      if (services.length) {
        return `Нашел услуги:\n${services.map((item) => `${item.code} - ${item.name} (${item.price})`).join("\n")}`;
      }
      return `По выбранному дому найдено ${flattenTariffHistory(house).length} строк истории тарифа. Текущий тариф: ${house.tariffSnapshot.map((item) => item.join(" ")).join(", ")}.`;
    }

    if (/документ|файл|вложен|pdf|xls|doc/i.test(query)) {
      if (results.attachments.length) {
        return `Подходящие документы:\n${results.attachments.map((item) => `${item.name} - ${item.description}`).join("\n")}`;
      }
      return "По этому запросу в прикрепленных документах ничего не найдено.";
    }

    if (/заполн|процент|готовн/i.test(query)) {
      return `Текущая заполненность карточки: ${getHouseCompletion(house)}%. Лучше всего заполнены разделы "основная информация", "тарифы" и "помещения". Внимание еще нужно разделам с техописанием и документами.`;
    }

    if (/панорам|карта|зона/i.test(query)) {
      return `У объекта ${house.shortName || house.name} настроены координаты ${house.coordinates.join(", ")} и зона обслуживания из ${house.serviceZone.length} точек. Панорама Яндекс открывается из верхней панели и карточки, при необходимости точка уточняется по адресу.`;
    }

    if (results.premises.length || results.attachments.length || results.services.length) {
      return [
        results.premises.length ? `Помещения: ${results.premises.map((item) => item.code).join(", ")}` : "",
        results.attachments.length ? `Документы: ${results.attachments.map((item) => item.name).join(", ")}` : "",
        results.services.length ? `Услуги: ${results.services.slice(0, 3).map((item) => item.code).join(", ")}` : ""
      ]
        .filter(Boolean)
        .join("\n");
    }

    return "Я не нашел точного совпадения. Попробуйте спросить про конкретный код помещения, тариф, документ, раздел карточки или попросите краткий отчет.";
  }

  function exportState() {
    const blob = new Blob([JSON.stringify(state.data, null, 2)], { type: "application/json;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const link = document.createElement("a");
    link.href = url;
    link.download = `vysota-service-demo-${new Date().toISOString().slice(0, 10)}.json`;
    link.click();
    URL.revokeObjectURL(url);
  }

  function importState(file) {
    const reader = new FileReader();
    reader.onload = function () {
      try {
        const payload = JSON.parse(String(reader.result || "{}"));
        if (!payload.houses || !Array.isArray(payload.houses)) {
          throw new Error("Некорректный JSON");
        }
        state.data = payload;
        ensureSelection();
        saveState();
        render();
        toast("JSON успешно импортирован.");
      } catch (error) {
        toast("Не удалось импортировать JSON.");
      }
    };
    reader.readAsText(file, "utf-8");
  }

  function initMap() {
    const container = document.getElementById("object-map");
    const selectedHouse = getSelectedHouse();
    const houses = getFilteredHouses();
    const focusHouse = houses.find((item) => item.id === selectedHouse.id) || houses[0] || selectedHouse;
    if (!container) {
      return;
    }

    if (!window.ymaps) {
      container.innerHTML = '<div class="map-fallback">Яндекс Карты не загрузились. Проверьте доступ в интернет и API-ключ.</div>';
      return;
    }

    window.ymaps.ready(function () {
      destroyMap();

      mapInstance = new window.ymaps.Map("object-map", {
        center: focusHouse.coordinates,
        zoom: 13,
        controls: ["zoomControl", "typeSelector", "fullscreenControl"]
      });

      houses.forEach((item) => {
        const isSelected = item.id === focusHouse.id;
        const placemark = new window.ymaps.Placemark(
          item.coordinates,
          {
            balloonContentHeader: escapeHtml(item.name),
            balloonContentBody: `${escapeHtml(item.address)}<br>Статус: ${escapeHtml(item.status)}<br>Заполненность: ${getHouseCompletion(item)}%`
          },
          {
            preset: isSelected ? "islands#redHomeCircleIcon" : "islands#nightCircleDotIcon"
          }
        );

        placemark.events.add("click", function () {
          state.ui.selectedHouseId = item.id;
          state.ui.activeView = "card";
          saveState();
          render();
        });

        mapInstance.geoObjects.add(placemark);

        if (Array.isArray(item.serviceZone) && item.serviceZone.length > 2) {
          const polygon = new window.ymaps.Polygon(
            [item.serviceZone],
            {
              hintContent: `Зона обслуживания: ${escapeHtml(item.shortName || item.name)}`
            },
            {
              fillColor: isSelected ? "rgba(231, 76, 60, 0.16)" : "rgba(59, 130, 246, 0.12)",
              strokeColor: isSelected ? "#ef4444" : "#3b82f6",
              strokeWidth: 2
            }
          );
          polygon.events.add("click", function () {
            toast(`Зона обслуживания: ${item.shortName || item.name}`);
          });
          mapInstance.geoObjects.add(polygon);
        }
      });
    });
  }

  function clearPanoramaPlayer(mode) {
    if (mode === "inline") {
      destroyInlinePanorama();
      return;
    }
    if (panoramaPlayer) {
      panoramaPlayer.destroy();
      panoramaPlayer = null;
    }
  }

  function setPanoramaStatus(message, containerId, mode) {
    const resolvedContainerId = containerId || "panorama-player";
    const resolvedMode = mode || "modal";
    const container = document.getElementById(resolvedContainerId);
    if (!container) {
      return;
    }
    clearPanoramaPlayer(resolvedMode);
    container.innerHTML = `<div class="panorama-player__status">${escapeHtml(message)}</div>`;
  }

  function showPanorama(point, fallback, containerId, mode, radius) {
    const resolvedContainerId = containerId || "panorama-player";
    const resolvedMode = mode || "modal";
    const searchRadius = radius || 120;
    window.ymaps.panorama.locate(point, { radius: searchRadius }).done(
      function (panoramas) {
        if (!panoramas.length) {
          fallback();
          return;
        }
        const container = document.getElementById(resolvedContainerId);
        if (!container) {
          return;
        }
        container.innerHTML = "";
        clearPanoramaPlayer(resolvedMode);
        const player = new window.ymaps.panorama.Player(resolvedContainerId, panoramas[0], {
          controls: ["zoomControl", "fullscreenControl"]
        });
        if (resolvedMode === "inline") {
          inlinePanoramaPlayer = player;
        } else {
          panoramaPlayer = player;
        }
      },
      function () {
        fallback();
      }
    );
  }

  function geocodeHouseAddress(house, onSuccess, onFailure) {
    if (!house.address || !window.ymaps || !window.ymaps.geocode) {
      onFailure();
      return;
    }
    window.ymaps.geocode(house.address, { results: 1, kind: "house" }).then(
      function (result) {
        const firstGeoObject = result.geoObjects.get(0);
        if (!firstGeoObject || !firstGeoObject.geometry) {
          onFailure();
          return;
        }
        onSuccess(firstGeoObject.geometry.getCoordinates());
      },
      function () {
        onFailure();
      }
    );
  }

  function showPanoramaNearAddress(house, containerId, mode, onFailure) {
    const radii = [30, 55, 90];
    geocodeHouseAddress(
      house,
      function (addressPoint) {
        const tryRadius = function (index) {
          if (index >= radii.length) {
            onFailure("Панорама по адресу дома не найдена.");
            return;
          }
          showPanorama(
            addressPoint,
            function () {
              tryRadius(index + 1);
            },
            containerId,
            mode,
            radii[index]
          );
        };
        tryRadius(0);
      },
      function () {
        onFailure("Не удалось определить дом по адресу.");
      }
    );
  }

  function initInlinePanorama(house) {
    const container = document.getElementById("object-panorama");
    if (!container) {
      return;
    }
    if (!window.ymaps || !window.ymaps.panorama) {
      setPanoramaStatus("Панорамы Яндекс недоступны в текущем окружении.", "object-panorama", "inline");
      return;
    }

    setPanoramaStatus("Определяем дом по адресу и ищем ближайшую панораму...", "object-panorama", "inline");

    window.ymaps.ready(function () {
      showPanoramaNearAddress(
        house,
        "object-panorama",
        "inline",
        function (message) {
          setPanoramaStatus(message || "Панорама по адресу не найдена.", "object-panorama", "inline");
        }
      );
    });
  }

  function openPanorama() {
    const house = getSelectedHouse();
    if (!window.ymaps || !window.ymaps.panorama) {
      toast("Панорамы Яндекс недоступны в текущем окружении.");
      return;
    }

    const modal = document.querySelector(".panorama-modal");
    if (!modal) {
      toast("Не удалось открыть контейнер панорамы.");
      return;
    }

    modal.classList.add("is-open");
    setPanoramaStatus("Определяем дом по адресу и ищем ближайшую панораму...", "panorama-player", "modal");

    window.ymaps.ready(function () {
      showPanoramaNearAddress(house, "panorama-player", "modal", function (message) {
        setPanoramaStatus(message || "Панорама по адресу не найдена.", "panorama-player", "modal");
        toast(message || "Панорама по адресу не найдена.");
      });
    });
  }

  function closePanorama() {
    const modal = document.querySelector(".panorama-modal");
    if (modal) {
      modal.classList.remove("is-open");
    }
    if (panoramaPlayer) {

  function iconGlyph(icon) {
    if (icon === "dashboard") return "◫";
    if (icon === "map") return "⌖";
    if (icon === "card") return "▣";
    if (icon === "admin") return "⚙";
    return "•";
  }

  function percent(value) {
    return `${Math.round((Number(value) || 0) * 100)}%`;
  }

  function humanizeKey(key) {
    const map = {
      portfolioStatus: "Статус",
      buildings: "Корпусов",
      apartments: "Квартир",
      premises: "Помещений",
      totalArea: "Общая площадь",
      tariffArea: "Тарифицируемая площадь",
      parkingPlaces: "Машино-мест",
      specialAccount: "Спецсчет ФКР",
      role: "Должность",
      data: "Данные",
      email: "Почта",
      phone: "Телефон",
      status: "Статус",
      rate: "Ставка",
      season: "Сезон",
      time: "Время на посту",
      serviceType: "Услуга",
      subject: "Объекты"
    };
    return map[key] || key;
  }

  function statusKey(status) {
    const normalized = String(status || "").toLowerCase();
    if (normalized.includes("жив")) return "live";
    if (normalized.includes("ремонт")) return "repair";
    if (normalized.includes("без")) return "idle";
    if (normalized.includes("не прод") || normalized.includes("непрод")) return "unsold";
    return "idle";
  }

  function scopeLabel(scopeType, scopeId) {
    if (scopeType === "house") {
      return "Объект";
    }
    if (scopeType === "premise") {
      const house = getSelectedHouse();
      const premise = house.premises.find((item) => item.id === scopeId);
      return premise ? `Помещение ${premise.code}` : "Помещение";
    }
    if (scopeType === "section") {
      const sectionMap = {
        overview: "Основная информация",
        staff: "Персонал",
        tariffs: "Тарифы",
        contracts: "Договоры",
        oss: "ОСС",
        metrics: "Метрики",
        audit: "Аудит",
        technical: "Техописание",
        documents: "Документы",
        map: "Карта"
      };
      return sectionMap[scopeId] || `Раздел ${scopeId}`;
    }
    return scopeType || "Область";
  }

  function badge(text) {
    return `<span class="tag tag-inline">${escapeHtml(text)}</span>`;
  }

  function formatMoney(value) {
    const numeric = Number(value);
    if (Number.isNaN(numeric)) {
      return String(value);
    }
    return new Intl.NumberFormat("ru-RU").format(numeric) + " ₽";
  }

  function sparklineSVG(values) {
    const width = 520;
    const height = 180;
    const max = Math.max(...values, 1);
    const min = Math.min(...values, 0);
    const points = values
      .map((value, index) => {
        const x = (index / Math.max(values.length - 1, 1)) * (width - 20) + 10;
        const y = height - ((value - min) / Math.max(max - min, 1)) * (height - 30) - 15;
        return `${x},${y}`;
      })
      .join(" ");

    return `
      <svg viewBox="0 0 ${width} ${height}" class="sparkline" role="img" aria-label="График заявок">
        <defs>
          <linearGradient id="sparklineGradient" x1="0" x2="0" y1="0" y2="1">
            <stop offset="0%" stop-color="rgba(210,39,63,0.42)"></stop>
            <stop offset="100%" stop-color="rgba(210,39,63,0.04)"></stop>
          </linearGradient>
        </defs>
        <polyline fill="none" stroke="#d2273f" stroke-width="4" points="${points}"></polyline>
      </svg>
    `;
  }

  function parseCoords(value) {
    if (!value) return null;
    const parts = String(value)
      .split(",")
      .map((item) => Number(item.trim()));
    if (parts.length !== 2 || parts.some((item) => Number.isNaN(item))) {
      return null;
    }
    return parts;
  }

  function parsePolygon(value) {
    if (!value) return [];
    return String(value)
      .split(";")
      .map((pair) => pair.split(",").map((item) => Number(item.trim())))
      .filter((pair) => pair.length === 2 && pair.every((item) => !Number.isNaN(item)));
  }

  function defaultZone(coords) {
    return [
      [coords[0] + 0.004, coords[1] - 0.006],
      [coords[0] + 0.004, coords[1] + 0.006],
      [coords[0] - 0.004, coords[1] + 0.006],
      [coords[0] - 0.004, coords[1] - 0.006]
    ];
  }

  function slugify(value) {
    return String(value || "")
      .toLowerCase()
      .replace(/["']/g, "")
      .replace(/[^a-zа-я0-9]+/gi, "-")
      .replace(/^-+|-+$/g, "");
  }

  function valueOr(value, fallback) {
    const normalized = String(value || "").trim();
    return normalized || fallback;
  }

  function escapeHtml(value) {
    return String(value)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#39;");
  }

  function escapeAttr(value) {
    return escapeHtml(value).replace(/"/g, "&quot;");
  }
})();

  </script>
